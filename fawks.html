<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fawks | Nevermore</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style-fawks.css">
</head>
<body>

    <div id="loader" class="loader">
        <div class="loader-content">
            <img src="./images/logosolo/fawks.png" alt="Loading..." class="loader-logo">
            <div class="progress-bar"></div>
        </div>
    </div>

    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <img src="./images/collectif/logo.png" alt="Nevermore Logo" class="sidebar-logo">
            <button id="close-btn" class="close-btn">&times;</button>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">L'accueil</a></li>
            <li><a href="membres.html">Nos Membres</a></li>
            <li><a href="projets.html">Nos Projets</a></li>
            <li><a href="agenda.html">Notre Agenda</a></li>
            <li><a href="contact.html">Nos Réseaux & Contact</a></li>
            <li><a href="soutien.html">Nous soutenir</a></li>
        </ul>
    </nav>
    <div id="overlay" class="overlay"></div>

    <header class="header-transparent">
        <button id="hamburger-btn" class="hamburger-btn">
            <img src="./images/collectif/logo.png" alt="Nevermore Logo" class="logo-btn-image">
        </button>
    </header>

    <main class="profile-container">
        <div class="profile-header">
            <div class="logo-circle">
                <img src="./images/logosolo/fawks.png" alt="Fawks Logo">
            </div>
            <h1>Fawks</h1>
        </div>

        <div class="links-list">
            <a href="https://discord.com/invite/ue6Ehe6mRC" class="cloud-link">Discord</a>
            <a href="https://www.twitch.tv/f4wksfr" class="cloud-link">Twitch</a>
            <a href="https://x.com/F4wksFr" class="cloud-link">X</a>
            <a href="https://www.youtube.com/@F4wksFr" class="cloud-link">YouTube</a>
            <a href="projets.html#communaute" class="cloud-link">Projet Minecraft</a>
        </div>
    </main>

    <script src="./script.js"></script>
    <script>
        // Script pour retirer le loader après le chargement
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            setTimeout(() => {
                loader.classList.add('fade-out');
                setTimeout(() => { loader.style.display = 'none'; }, 1000);
            }, 1500); // Temps d'affichage du loader (1.5s)
        });
    </script>
</body>
</html>
